<footer class="bg-surface-100 dark:bg-surface-900 border-t border-surface-200 dark:border-surface-800">
  <div class="max-w-7xl mx-auto px-6 py-12">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
      <div>
        <a routerLink="/" class="flex items-center gap-3 mb-4">
          <svg class="h-8 w-8" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="fGrad" x1="0" y1="0" x2="48" y2="48">
                <stop offset="0%" stop-color="#e2a04e"/>
                <stop offset="100%" stop-color="#bd7023"/>
              </linearGradient>
            </defs>
            <circle cx="24" cy="24" r="23" fill="url(#fGrad)" opacity="0.15"/>
            <circle cx="24" cy="24" r="17" fill="none" stroke="#d4892e" stroke-width="2"/>
            <circle cx="24" cy="24" r="9" fill="none" stroke="#d4892e" stroke-width="1.5"/>
            <circle cx="24" cy="24" r="3.5" fill="#d4892e"/>
          </svg>
          <span class="text-lg font-display font-semibold">{{ siteName() }}</span>
        </a>
        <p class="text-sm text-surface-500 dark:text-surface-400">
          {{ tagline() }}
        </p>
      </div>

      <div>
        <h3 class="font-display font-semibold mb-4 text-surface-900 dark:text-white">{{ linksTitle() }}</h3>
        <nav class="space-y-2">
          <a routerLink="/" class="block text-sm text-surface-500 dark:text-surface-400 hover:text-primary-500 transition-colors">Inicio</a>
          <a routerLink="/about-me" class="block text-sm text-surface-500 dark:text-surface-400 hover:text-primary-500 transition-colors">Sobre mí</a>
          <a routerLink="/portfolio" class="block text-sm text-surface-500 dark:text-surface-400 hover:text-primary-500 transition-colors">Portafolio</a>
          <a routerLink="/contact" class="block text-sm text-surface-500 dark:text-surface-400 hover:text-primary-500 transition-colors">Contacto</a>
        </nav>
      </div>

      <div>
        <h3 class="font-display font-semibold mb-4 text-surface-900 dark:text-white">{{ socialTitle() }}</h3>
        <div class="flex gap-3">
          <a [href]="getSocialUrl('instagram')" target="_blank" rel="noopener noreferrer"
             class="w-10 h-10 flex items-center justify-center rounded-lg bg-surface-200 dark:bg-surface-800 hover:bg-primary-500/20 text-surface-600 dark:text-surface-300 hover:text-primary-500 transition-all"
             aria-label="Instagram">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
          </a>
          <a [href]="getSocialUrl('whatsapp')" target="_blank" rel="noopener noreferrer"
             class="w-10 h-10 flex items-center justify-center rounded-lg bg-surface-200 dark:bg-surface-800 hover:bg-green-500/20 text-surface-600 dark:text-surface-300 hover:text-green-500 transition-all"
             aria-label="WhatsApp">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          </a>
        </div>
      </div>
    </div>

    <hr class="border-surface-200 dark:border-surface-800 mb-6" />
    <p class="text-center text-sm text-surface-400 dark:text-surface-500">{{ copyrightText() }}</p>
  </div>
</footer>
