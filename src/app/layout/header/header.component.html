<header class="sticky top-0 z-50 bg-surface-50/80 dark:bg-surface-950/80 backdrop-blur-md border-b border-surface-200 dark:border-surface-800">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      <a routerLink="/" class="flex items-center gap-3 group">
        <!-- Logo icon -->
        <svg class="h-10 w-10" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="hGrad" x1="0" y1="0" x2="48" y2="48">
              <stop offset="0%" stop-color="#e2a04e"/>
              <stop offset="100%" stop-color="#bd7023"/>
            </linearGradient>
          </defs>
          <circle cx="24" cy="24" r="23" fill="url(#hGrad)" opacity="0.15"/>
          <circle cx="24" cy="24" r="17" fill="none" stroke="#d4892e" stroke-width="2"/>
          <circle cx="24" cy="24" r="9" fill="none" stroke="#d4892e" stroke-width="1.5"/>
          <circle cx="24" cy="24" r="3.5" fill="#d4892e"/>
        </svg>
        <span class="text-xl font-display font-semibold text-surface-900 dark:text-white group-hover:text-primary-500 transition-colors">{{ title }}</span>
      </a>

      <div class="flex items-center gap-4">
        <app-nav-bar />
        <app-theme-toggle />
      </div>
    </div>
  </div>
</header>
