<div class="min-h-screen flex items-center justify-center bg-surface-900 px-4 relative overflow-hidden">
  <!-- Subtle background pattern -->
  <div class="absolute inset-0 opacity-5">
    <div class="absolute inset-0" style="background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.15) 1px, transparent 0); background-size: 40px 40px;"></div>
  </div>

  <div class="text-center relative z-10">
    <!-- Lock Icon -->
    <div class="mx-auto w-20 h-20 rounded-full bg-surface-800 border border-surface-700 flex items-center justify-center mb-8">
      <svg class="w-10 h-10 text-red-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
      </svg>
    </div>

    <!-- Error Code -->
    <h1 class="text-7xl font-display font-bold mb-4 bg-gradient-to-r from-red-400 via-red-500 to-primary-500 bg-clip-text text-transparent">
      403
    </h1>

    <!-- Title -->
    <h2 class="text-2xl font-display font-semibold text-surface-100 mb-3">Access Denied</h2>

    <!-- Description -->
    <p class="text-surface-400 mb-8 max-w-md mx-auto leading-relaxed">
      You don't have permission to access this resource. Please contact your administrator if you believe this is an error.
    </p>

    <!-- Back Button -->
    <a
      routerLink="/admin-page"
      class="inline-flex items-center gap-2 px-8 py-3 bg-primary-600 hover:bg-primary-500 text-white font-medium rounded-full transition-all duration-200 hover:shadow-lg hover:shadow-primary-600/25"
    >
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
      </svg>
      Back to Dashboard
    </a>
  </div>
</div>
