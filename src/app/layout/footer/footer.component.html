<footer class="bg-surface-100 dark:bg-surface-900 border-t border-surface-200 dark:border-surface-800">
  <div class="max-w-7xl mx-auto px-6 py-12">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
      <div>
        <a routerLink="/" class="flex items-center gap-3 mb-4">
          @if (logoUrl()) {
            <img [src]="logoUrl()" [alt]="siteName()" class="h-8 w-8 rounded-full object-cover" />
          } @else {
            <span class="h-8 w-8 rounded-full bg-primary-500/15 flex items-center justify-center text-primary-600 dark:text-primary-400 font-display font-bold text-sm">
              {{ siteName().charAt(0) || 'P' }}
            </span>
          }
          <span class="text-lg font-display font-semibold">{{ siteName() }}</span>
        </a>
        <p class="text-sm text-surface-500 dark:text-surface-400">
          {{ tagline() }}
        </p>
      </div>

      @if (showLinks()) {
      <div>
        <h3 class="font-display font-semibold mb-4 text-surface-900 dark:text-white">{{ linksTitle() || 'Links' }}</h3>
        <nav class="space-y-2">
          @for (link of navLinks(); track link.path) {
            <a [routerLink]="link.path" class="block text-sm text-surface-500 dark:text-surface-400 hover:text-primary-500 transition-colors">{{ link.label }}</a>
          }
        </nav>
      </div>
      }
    </div>

    <hr class="border-surface-200 dark:border-surface-800 mb-6" />
    <p class="text-center text-sm text-surface-400 dark:text-surface-500">{{ copyrightText() }}</p>
  </div>
</footer>
