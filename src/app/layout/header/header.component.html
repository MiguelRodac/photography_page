<header class="sticky top-0 z-50 bg-surface-50/80 dark:bg-surface-950/80 backdrop-blur-md border-b border-surface-200 dark:border-surface-800">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      @if (siteName() || logoUrl()) {
      <a routerLink="/" class="flex items-center gap-3 group">
        @if (logoUrl()) {
          <img [src]="logoUrl()" [alt]="siteName()" class="h-10 w-10 rounded-full object-cover" />
        } @else {
          <span class="h-10 w-10 rounded-full bg-primary-500/15 flex items-center justify-center text-primary-600 dark:text-primary-400 font-display font-bold text-lg">
            {{ siteName().charAt(0) }}
          </span>
        }
        <span class="text-xl font-display font-semibold text-surface-900 dark:text-white group-hover:text-primary-500 transition-colors">{{ siteName() }}</span>
      </a>
      }

      <div class="flex items-center gap-4">
        <app-nav-bar />
        <app-theme-toggle />
      </div>
    </div>
  </div>
</header>
