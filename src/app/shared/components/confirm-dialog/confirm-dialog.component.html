<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop with blur -->
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

  <!-- Card -->
  <div class="relative bg-surface-800 border border-surface-700 rounded-xl shadow-2xl p-6 max-w-md w-full transform transition-all duration-200 scale-100">
    <!-- Icon -->
    <div class="mx-auto w-12 h-12 rounded-full bg-red-500/10 border border-red-500/20 flex items-center justify-center mb-4">
      <svg class="w-6 h-6 text-red-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
      </svg>
    </div>

    <!-- Title -->
    <h2 class="text-xl font-display font-semibold text-surface-100 text-center mb-2">{{ title }}</h2>

    <!-- Message -->
    <p class="text-surface-400 text-center mb-6 leading-relaxed">{{ message }}</p>

    <!-- Actions -->
    <div class="flex gap-3">
      <button
        (click)="onCancel()"
        class="w-full px-4 py-2.5 bg-surface-700 hover:bg-surface-600 text-surface-200 font-medium rounded-lg transition-colors duration-200 border border-surface-600"
      >
        {{ resolvedCancelText }}
      </button>
      <button
        (click)="onConfirm()"
        class="w-full px-4 py-2.5 bg-red-600 hover:bg-red-500 text-white font-medium rounded-lg transition-colors duration-200 shadow-lg shadow-red-600/20"
      >
        {{ resolvedConfirmText }}
      </button>
    </div>
  </div>
</div>
